syntax = "proto3";

package gfp_server;

import "Utilities/GFP_Tools/nearneighbours.proto";

// A near-neighbour request can specify either a number of neighbours to
// find, or a maximum distance.
//
// The same message is used by both the binary protobuf HTTP endpoint and the
// JSON endpoint. For JSON, the protobuf JSON representation can be used, for
// example:
//   {"smiles":"CCO", "id":"ethanol", "nbrs":10}
// or:
//   {"smiles":"CCO", "id":"ethanol", "distance":0.25}
message NnRequest {
  string smiles = 1;
  string id = 2;

  oneof request {
    uint32 nbrs = 3;
    float distance = 4;
  }
}

// Multiple independent near-neighbour requests in one HTTP call.
// This avoids per-request HTTP overhead when searching many query molecules.
message NnBatchRequest {
  repeated NnRequest request = 1;
}

enum Status {
  OK = 0;
  NO_DIRECTIVE = 1;
  NO_SMILES = 2;
  BAD_SMILES = 3;
  SERVER_ERROR = 4;
}

message NnReply {
  // OK means the request was processed successfully. The result may still have
  // no neighbours, for example when a distance cutoff finds no matches.
  Status status = 1;

  // Human-readable detail for errors and diagnostics. Intended for logs, curl,
  // and simple client error messages.
  string message = 2;

  nnbr.NearNeighbours result = 3;
}

message NnBatchReply {
  repeated NnReply reply = 1;
}
