syntax = "proto3";

package xgboost_model;

option go_package = "xgboost/xgboost_model";

enum TreeMethod {
  UNDEFINED = 0;
  AUTO = 1;
  EXACT = 2;
  APPROX = 3;
  HIST = 4;
}

message XGBoostParameters {
  oneof learning_rate_aliases {
    float eta = 1;
    float learning_rate = 2;
  }

  oneof min_split_loss_aliases {
    float gamma = 3;
    float min_split_loss = 4;
  }

  optional uint32 max_depth = 5;

  optional float min_child_weight = 6;

  optional float max_delta_step = 7;

  optional float subsample = 8;

  optional string sampling_method = 9;

  optional float colsample_bytree = 10;
  optional float colsample_bylevel = 11;
  optional float colsample_bynode = 12;

  oneof lambda_aliases {
    float lambda = 13;
    float reg_lambda = 14;
  }

  oneof alpha_aliases {
    float alpha = 15;
    float reg_alpha = 16;
  }

  optional TreeMethod tree_method = 17;

  optional float scale_pos_weight = 18;

  optional uint32 n_estimators = 19;

//optional uint32 min_samples_split = 5;
}

message LightGbmParameters {
}

message XGBoostModel {
  optional string model_type = 1;

  optional string response = 2;

  optional XGBoostParameters parameters = 3;

  optional bool classification = 4;

  // When a model is evaluated we need to ensure that we have the same
  // column order as was used during training, so we store a cross reference
  // from column name to column number that the evaluation script can use to
  // ensure that the same features are sent to the model.
  map<string, uint32> name_to_col = 5;
}
